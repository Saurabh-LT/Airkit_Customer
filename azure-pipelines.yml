trigger:
      branches:
        include:
          - main

pool:
      vmImage: ubuntu-latest

parameters:
      - name: suiteXmlFile
        displayName: TestNG suite to run
        type: string
        default: LT_TestNG.xml
        values:
          - LT_TestNG.xml
          - TestNG.xml

variables:
      MAVEN_CACHE_FOLDER: $(Pipeline.Workspace)/.m2/repository
      MAVEN_OPTS: -Dmaven.repo.local=$(MAVEN_CACHE_FOLDER)
      APP_URL: lt://APP10160362031780051969941430

steps:
      - task: JavaToolInstaller@0
        displayName: Set Java Version
        inputs:
          versionSpec: "8"
          jdkArchitectureOption: x64
          jdkSourceOption: PreInstalled

      - task: Cache@2
        displayName: Cache Maven dependencies
        inputs:
          key: 'maven | "$(Agent.OS)" | pom.xml'
          restoreKeys: |
            maven | "$(Agent.OS)"
            maven
          path: $(MAVEN_CACHE_FOLDER)

      - task: configuration@1
        inputs:
            connection: 'Saurabh-Prod-Cred'
            isTunnelActivate: false
            isAppAutomate: true
            isSmartUI: false

      - script: |
          echo "===== DEBUG (no secrets leaked) ====="
          echo "LT_USERNAME    length=${#LT_USERNAME}   first3='${LT_USERNAME:0:3}'"
          echo "LT_ACCESS_KEY  length=${#LT_ACCESS_KEY} first5='${LT_ACCESS_KEY:0:5}'"
          echo "APP_URL        $APP_URL"
          echo "====================================="
          mvn -B -e test \
            -DsuiteXmlFile=${{ parameters.suiteXmlFile }} \
            -DLT_USER_NAME="$LT_USERNAME" \
            -DLT_ACCESS_KEY="$LT_ACCESS_KEY" \
            -DBUILD_NAME="Azure-$(Build.BuildNumber)" \
            -DSMARTUI_PROJECT="running from Azure" \
            -DAPP_URL="$APP_URL"
        displayName: Run TestNG Suite
        env:
          LT_USERNAME: $(LT_USERNAME)
          LT_ACCESS_KEY: $(LT_ACCESS_KEY)
          APP_URL: $(APP_URL)

      - task: PublishTestResults@2
        displayName: Publish TestNG Results
        condition: succeededOrFailed()
        inputs:
          testResultsFormat: JUnit
          testResultsFiles: "**/surefire-reports/TEST-*.xml"
          testRunTitle: LambdaTest Results

      - task: PublishPipelineArtifact@1
        displayName: Publish Surefire Reports
        condition: succeededOrFailed()
        inputs:
          targetPath: target/surefire-reports
          artifact: test-reports
          publishLocation: pipeline

      - task: LambdatestResults@1

      - task: configuration@1
        inputs:
            isTunnelActivate: false
            isAppAutomate: true
            isSmartUI: true
